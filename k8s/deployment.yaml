apiVersion: v1
kind: Namespace
metadata:
  name: slate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slate
  namespace: slate
  labels:
    app: slate
    version: v0.1.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: slate
  template:
    metadata:
      labels:
        app: slate
        version: v0.1.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: slate
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      containers:
      - name: slate
        image: slate:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: TUNARR_API_URL
          valueFrom:
            configMapKeyRef:
              name: slate-config
              key: tunarr_api_url
              optional: true
        - name: PSEUDOVISION_API_URL
          valueFrom:
            configMapKeyRef:
              name: slate-config
              key: pseudovision_api_url
              optional: true
        
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: slate
  namespace: slate
  labels:
    app: slate
spec:
  type: ClusterIP
  selector:
    app: slate
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: slate
  namespace: slate
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: slate
  namespace: slate
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: slate
  namespace: slate
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: slate
subjects:
- kind: ServiceAccount
  name: slate
  namespace: slate
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: slate-config
  namespace: slate
data:
  tunarr_api_url: "http://tunarr:8000"
  pseudovision_api_url: "http://pseudovision:9000"
