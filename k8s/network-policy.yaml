apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: slate-network-policy
  namespace: slate
spec:
  podSelector:
    matchLabels:
      app: slate
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: slate
    - podSelector:
        matchLabels:
          app: slate
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - podSelector:
        matchLabels:
          app: tunarr
    ports:
    - protocol: TCP
      port: 8000
  - to:
    - podSelector:
        matchLabels:
          app: pseudovision
    ports:
    - protocol: TCP
      port: 9000
